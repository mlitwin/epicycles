<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epicycles</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #07080f; }
      canvas { display: block; }
      #controls {
        position: fixed;
        bottom: 16px;
        left: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font: 11px monospace;
        color: #556677;
        user-select: none;
      }
      #speed-slider {
        width: 100px;
        accent-color: #334455;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="controls">
      <span>Speed</span>
      <input id="speed-slider" type="range" min="0" max="5" step="0.1" value="1" />
      <span id="speed-label">1.0×</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
